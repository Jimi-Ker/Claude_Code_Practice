<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary Station · Cox AI Hub</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="config.js"></script>
</head>
<body>
  <header><div class="header-inner"></div></header>

  <main>
    <div class="page-head">
      <h2>📖 AI Glossary Station</h2>
      <p>Plain-English definitions of the AI terms you'll come across. Jump by letter or search as you type.</p>
    </div>

    <div class="controls">
      <div class="search-bar">
        <label for="search" class="sr-only">Search glossary</label>
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search" placeholder="Search terms or definitions..." />
      </div>
    </div>

    <div class="az-bar" id="az-bar"></div>
    <div class="count" id="count"></div>
    <div id="glossary-list"></div>
  </main>

  <footer><div class="footer-inner"></div></footer>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/glossary.js"></script>
</body>
</html>
