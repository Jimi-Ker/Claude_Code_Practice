<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guides & Tutorials · Cox AI Hub</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="config.js"></script>
</head>
<body>
  <header><div class="header-inner"></div></header>

  <main>
    <div class="page-head">
      <h2>📚 AI Guides &amp; Tutorials</h2>
      <p>Build your AI skills at your own pace. Filter by format or experience level, or search for a topic.</p>
    </div>

    <div class="controls">
      <div class="search-bar">
        <label for="search" class="sr-only">Search guides</label>
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search" placeholder="Search guides by title, topic, or tag..." />
      </div>
      <div class="filters">
        <div class="filter-group"><span class="filter-label">Format</span><div id="type-filters" style="display:contents"></div></div>
      </div>
      <div class="filters" style="margin-top:8px">
        <div class="filter-group"><span class="filter-label">Level</span><div id="level-filters" style="display:contents"></div></div>
      </div>
    </div>

    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </main>

  <footer><div class="footer-inner"></div></footer>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/guides.js"></script>
</body>
</html>
