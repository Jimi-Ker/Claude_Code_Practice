<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tool Shop · Cox AI Hub</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script src="config.js"></script>
</head>
<body>
  <header><div class="header-inner"></div></header>

  <main>
    <div class="page-head">
      <h2>🛍️ AI Tool Shop</h2>
      <p>Browse the AI tools available to the team. Check the status badge before you use one — <strong>Approved</strong> is cleared for everyday work, <strong>Pilot</strong> is limited testing, and <strong>Restricted</strong> should be avoided.</p>
    </div>

    <div class="controls">
      <div class="search-bar">
        <label for="search" class="sr-only">Search tools</label>
        <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search" placeholder="Search tools by name, use, or owner..." />
      </div>
      <div class="filters">
        <div class="filter-group"><span class="filter-label">Category</span><div id="cat-filters" style="display:contents"></div></div>
      </div>
      <div class="filters" style="margin-top:8px">
        <div class="filter-group"><span class="filter-label">Status</span><div id="status-filters" style="display:contents"></div></div>
      </div>
    </div>

    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
  </main>

  <footer><div class="footer-inner"></div></footer>

  <script src="assets/js/common.js"></script>
  <script src="assets/js/tools.js"></script>
</body>
</html>
