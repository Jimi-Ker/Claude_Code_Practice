name: Deploy AI Content Hub to Pages

# Publishes the static cox-ai-hub/ site to GitHub Pages.
# One-time setup: Repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". After that, every push here redeploys automatically.

on:
  push:
    branches:
      - claude/cox-ai-content-hub-aelgg7
      - main
    paths:
      - "cox-ai-hub/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the hub folder as the site root, so the live URL is clean:
          # https://<user>.github.io/<repo>/
          path: cox-ai-hub

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
